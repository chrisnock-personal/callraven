; ─── extensions.conf ──────────────────────────────────────────────────────
[default]

; Ring 1002 when 1001 dials it (and vice versa)
exten => 1001,1,Dial(SIP/1001,30)
exten => 1001,n,Hangup()

exten => 1002,1,Dial(SIP/1002,30)
exten => 1002,n,Hangup()

; Echo test: dial 9999 to hear your own audio back
exten => 9999,1,Answer()
exten => 9999,n,Echo()
exten => 9999,n,Hangup()

; Playback test: dial 5000 to hear Asterisk demo
exten => 5000,1,Answer()
exten => 5000,n,Playback(demo-congrats)
exten => 5000,n,Hangup()
