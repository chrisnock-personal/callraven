; ─── sip.conf ─────────────────────────────────────────────────────────────
; Minimal Asterisk SIP config for testing the SIP endpoint container.
; Enables WebSocket transport so JsSIP can connect over ws://asterisk:8088/ws

[general]
context=default
allowoverlap=no
udpbindaddr=0.0.0.0
tcpenable=yes
tcpbindaddr=0.0.0.0
websocket_enabled=yes
transport=udp,tcp,ws

; ── Test extensions ────────────────────────────────────────────────────────
[1001]
type=friend
username=1001
secret=1001secret
host=dynamic
context=default
allow=all
transport=ws,udp

[1002]
type=friend
username=1002
secret=1002secret
host=dynamic
context=default
allow=all
transport=ws,udp
